# Внутренний nginx фронт-контейнера: раздаёт SPA и проксирует /api в бэкенд.
# Внешний nginx домена koordinatorstvo2026.ru шлёт весь трафик сюда (:80).
server {
    listen 80;
    server_name _;
    client_max_body_size 12M;

    root  /usr/share/nginx/html;
    index index.html;

    # Docker DNS — резолвим имя бэкенда динамически
    resolver 127.0.0.11 valid=10s ipv6=off;

    # /api/* — на FastAPI, префикс сохраняем (бэкенд отдаёт роуты под /api)
    location /api/ {
        set $backend koord26-backend;
        proxy_pass         http://$backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # SPA: отдаём файл или откатываемся на index.html (history-режим роутера)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
